version: '3.8'

services:

  ml-service:
    build: ./ml-service
    restart: unless-stopped
    ports:
      - "5001:5001"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - ML_SERVICE_URL=http://ml-service:5001
      - FRONTEND_URL=https://frontend.cloudixpro.cloud
      - JWT_SECRET=${JWT_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
      - SMS_PROVIDER=${SMS_PROVIDER:-mock}
    depends_on:
      - ml-service

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://apitesting.cloudixpro.cloud/api
        VITE_WS_URL: wss://apitesting.cloudixpro.cloud/ws
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
